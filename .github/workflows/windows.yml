name: Windows

# Build the Windows desktop app and bundle the Qt runtime (windeployqt) into a
# portable zip. On a v* tag, attach it to the GitHub Release.
# Desktop is built locally during development, so this runs on tags / manually only.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags for git describe (version injection)

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtconnectivity

      - name: Configure
        run: cmake -S qt_app -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy + package
        run: |
          $exe = (Get-ChildItem build -Recurse -Filter SmacircleQt.exe | Select-Object -First 1).FullName
          if (-not $exe) { Write-Error "SmacircleQt.exe not found"; exit 1 }
          Write-Host "exe: $exe"
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --compiler-runtime --no-translations --qmldir qt_app $exe
          $appdir = Split-Path $exe
          New-Item -ItemType Directory -Force dist/SmacircleS1 | Out-Null
          Copy-Item "$appdir/*" dist/SmacircleS1/ -Recurse -Force
          Compress-Archive -Path dist/SmacircleS1/* -DestinationPath SmacircleS1-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmacircleS1-windows-x64
          path: SmacircleS1-windows-x64.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SmacircleS1-windows-x64.zip
